<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | AR Designs</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://use.typekit.net/etv7hms.css">
</head>
<body class="contact-page">
  <header>
    <a href="index.html" class="logo-link" aria-label="AR Designs home">
      <img src="images/logo.png" alt="AR Designs logo" class="site-logo">
    </a>
    <h1>AR Designs</h1>
  </header>

  <div id="container">
    <p>Design without soul is like food with no salt.</p>
  </div>

  <nav class="site-nav">
    <button type="button" class="nav-toggle" aria-expanded="false" aria-controls="primary-menu" aria-label="Toggle navigation">
      <span></span>
      <span></span>
      <span></span>
    </button>
    <div id="primary-menu" class="nav-links">
      <a href="index.html">Home</a>
      <a href="portfolio.html">Portfolio</a>
      <a href="about.html">About</a>
      <a href="contact.html" aria-current="page">Contact Me</a>
    </div>
  </nav>

  <main>
    <form>
      <table cellpadding="15px" align="center" width="700px" class="contact-table">
        <tr>
          <th colspan="2"><h2 class="contact-title">Contact</h2></th>
        </tr>
        <tr>
          <td class="contact-label">Name</td>
          <td><input type="text" placeholder="Your Name"></td>
        </tr>
        <tr>
          <td class="contact-label">Email</td>
          <td><input type="text" placeholder="Email"></td>
        </tr>
        <tr>
          <td class="contact-label">Questions</td>
          <td><textarea placeholder="Questions"></textarea></td>
        </tr>
        <tr class="noline">
          <td colspan="2"><input type="submit" value="Send Message" class="contact-submit"></td>
        </tr>
      </table>
    </form>
  </main>

  <div class="corner-gif-wrap" aria-hidden="true">
    <img src="images/luna.gif" alt="" class="corner-gif">
  </div>

  <footer>
    &copy; 2026 AR Designs
  </footer>
  <script src="script.js"></script>
</body>
</html>
